name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "UOS Server version to build (leave empty to use Dockerfile version)"
        required: false
        default: ""

env:
  DOCKER_IMAGE: hieutq/unifi-os-server
  FIRMWARE_API: https://fw-update.ubnt.com/api/firmware-latest

jobs:
  extract-amd64:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using version: $VERSION"

      - name: Get download URL from Ubiquiti API
        id: download
        run: |
          URL=$(curl -fsSL "$FIRMWARE_API?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-x64&filter=eq~~channel~~release" \
            | jq -r '._embedded.firmware[0]._links.data.href')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Download URL: $URL"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Download installer
        run: |
          curl -fSL -o unifi-os-server "${{ steps.download.outputs.url }}"
          chmod +x unifi-os-server

      - name: Run installer to extract image
        run: |
          sudo ./unifi-os-server install || true

      - name: Extract and save podman image
        run: |
          # The installer puts the image in podman storage under /home/uosserver
          sudo cp -r /home/uosserver/.local/share/containers ./containers || \
            sudo cp -r /home/uosserver/.config/containers ./containers || true
          sudo chown -R $USER:$USER ./containers

          # Get image info from podman
          IMAGE_TAG=$(sudo podman --root /home/uosserver/.local/share/containers/storage images --format "{{.Repository}}:{{.Tag}}" | head -1)
          echo "Found image: $IMAGE_TAG"

          # Save as Docker archive
          sudo podman --root /home/uosserver/.local/share/containers/storage save \
            --format docker-archive -o base-image-amd64.tar "$IMAGE_TAG"

      - name: Upload base image artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-image-amd64
          path: base-image-amd64.tar
          retention-days: 1

  extract-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get download URL from Ubiquiti API
        id: download
        run: |
          URL=$(curl -fsSL "$FIRMWARE_API?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-arm64&filter=eq~~channel~~release" \
            | jq -r '._embedded.firmware[0]._links.data.href')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Download URL: $URL"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Download installer
        run: |
          curl -fSL -o unifi-os-server "${{ steps.download.outputs.url }}"
          chmod +x unifi-os-server

      - name: Run installer to extract image
        run: |
          sudo ./unifi-os-server install || true

      - name: Extract and save podman image
        run: |
          IMAGE_TAG=$(sudo podman --root /home/uosserver/.local/share/containers/storage images --format "{{.Repository}}:{{.Tag}}" | head -1)
          echo "Found image: $IMAGE_TAG"

          sudo podman --root /home/uosserver/.local/share/containers/storage save \
            --format docker-archive -o base-image-arm64.tar "$IMAGE_TAG"

      - name: Upload base image artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-image-arm64
          path: base-image-arm64.tar
          retention-days: 1

  push:
    needs: [extract-amd64, extract-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download base image artifacts
        uses: actions/download-artifact@v4

      - name: Load amd64 base image
        run: |
          docker load -i base-image-amd64/base-image-amd64.tar
          LOADED=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
          docker tag "$LOADED" uosserver-base:amd64
          echo "Tagged $LOADED as uosserver-base:amd64"

      - name: Load arm64 base image
        run: |
          docker load -i base-image-arm64/base-image-arm64.tar
          LOADED=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v uosserver-base | head -1)
          docker tag "$LOADED" uosserver-base:arm64
          echo "Tagged $LOADED as uosserver-base:arm64"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=uosserver-base:amd64
            UOS_SERVER_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}-amd64

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=uosserver-base:arm64
            UOS_SERVER_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}-arm64

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create -t $DOCKER_IMAGE:$VERSION \
            $DOCKER_IMAGE:$VERSION-amd64 \
            $DOCKER_IMAGE:$VERSION-arm64
          docker buildx imagetools create -t $DOCKER_IMAGE:latest \
            $DOCKER_IMAGE:$VERSION-amd64 \
            $DOCKER_IMAGE:$VERSION-arm64

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: hieutq/unifi-os-server
          short-description: "Self-hosted UniFi OS Server - single volume, no privileged mode, multi-arch, auto-updated"
          readme-filepath: ./README.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
