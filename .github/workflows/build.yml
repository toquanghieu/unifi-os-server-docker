name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "UOS Server version to build (leave empty to use Dockerfile version)"
        required: false
        default: ""

env:
  DOCKER_IMAGE: hieutq/unifi-os-server
  FIRMWARE_API: https://fw-update.ubnt.com/api/firmware-latest

jobs:
  build-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get download URL from Ubiquiti API
        id: download
        run: |
          URL=$(curl -fsSL "$FIRMWARE_API?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-x64&filter=eq~~channel~~release" \
            | jq -r '._embedded.firmware[0]._links.data.href')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Install UniFi OS Server
        run: |
          mkdir -p /home/runner/.config/containers
          chmod 755 /home/runner /home/runner/.config /home/runner/.config/containers
          touch /home/runner/.config/containers/storage.conf
          chmod 644 /home/runner/.config/containers/storage.conf
          curl -fSL -o unifi-os-server "${{ steps.download.outputs.url }}"
          sudo chmod +x unifi-os-server
          echo "y" | sudo ./unifi-os-server
        continue-on-error: true

      - name: Copy podman image to runner and load into Docker
        run: |
          # Copy podman storage to runner
          for DIR in overlay overlay-images overlay-layers; do
            SRC="/home/uosserver/.local/share/containers/storage/$DIR"
            DST="/home/runner/.local/share/containers/storage/$DIR"
            if sudo test -d "$SRC"; then
              mkdir -p "$DST"
              sudo cp -a "$SRC/." "$DST/"
            fi
          done
          sudo chown -R runner:runner /home/runner/.local/share/containers/storage

          # Get image name from podman
          podman images
          IMAGE_TAG=$(podman images --noheading --format "{{.Repository}}:{{.Tag}}" | grep -v '<none>' | head -1)
          echo "Podman image: $IMAGE_TAG"

          # Convert to Docker
          podman save --format docker-archive -o /tmp/base.tar "$IMAGE_TAG"
          LOADED=$(docker load -i /tmp/base.tar 2>&1 | grep -oP 'Loaded image: \K.*')
          echo "Docker loaded: $LOADED"
          docker tag "$LOADED" uosserver-base:local
          rm /tmp/base.tar

          echo "==> All Docker images:"
          docker images

      - name: Build image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --build-arg BASE_IMAGE=uosserver-base:local \
            --build-arg UOS_SERVER_VERSION=$VERSION \
            -t $DOCKER_IMAGE:$VERSION-amd64 \
            .
          echo "==> Built image size:"
          docker images $DOCKER_IMAGE:$VERSION-amd64

      - name: Login and push
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          VERSION="${{ steps.version.outputs.version }}"
          docker push $DOCKER_IMAGE:$VERSION-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get download URL from Ubiquiti API
        id: download
        run: |
          URL=$(curl -fsSL "$FIRMWARE_API?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-arm64&filter=eq~~channel~~release" \
            | jq -r '._embedded.firmware[0]._links.data.href')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Install UniFi OS Server
        run: |
          mkdir -p /home/runner/.config/containers
          chmod 755 /home/runner /home/runner/.config /home/runner/.config/containers
          touch /home/runner/.config/containers/storage.conf
          chmod 644 /home/runner/.config/containers/storage.conf
          curl -fSL -o unifi-os-server "${{ steps.download.outputs.url }}"
          sudo chmod +x unifi-os-server
          echo "y" | sudo ./unifi-os-server
        continue-on-error: true

      - name: Copy podman image to runner and load into Docker
        run: |
          for DIR in overlay overlay-images overlay-layers; do
            SRC="/home/uosserver/.local/share/containers/storage/$DIR"
            DST="/home/runner/.local/share/containers/storage/$DIR"
            if sudo test -d "$SRC"; then
              mkdir -p "$DST"
              sudo cp -a "$SRC/." "$DST/"
            fi
          done
          sudo chown -R runner:runner /home/runner/.local/share/containers/storage

          podman images
          IMAGE_TAG=$(podman images --noheading --format "{{.Repository}}:{{.Tag}}" | grep -v '<none>' | head -1)
          echo "Podman image: $IMAGE_TAG"

          podman save --format docker-archive -o /tmp/base.tar "$IMAGE_TAG"
          LOADED=$(docker load -i /tmp/base.tar 2>&1 | grep -oP 'Loaded image: \K.*')
          echo "Docker loaded: $LOADED"
          docker tag "$LOADED" uosserver-base:local
          rm /tmp/base.tar

          docker images

      - name: Build image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --build-arg BASE_IMAGE=uosserver-base:local \
            --build-arg UOS_SERVER_VERSION=$VERSION \
            -t $DOCKER_IMAGE:$VERSION-arm64 \
            .
          echo "==> Built image size:"
          docker images $DOCKER_IMAGE:$VERSION-arm64

      - name: Login and push
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          VERSION="${{ steps.version.outputs.version }}"
          docker push $DOCKER_IMAGE:$VERSION-arm64

  manifest:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep -oP 'UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker manifest create $DOCKER_IMAGE:$VERSION \
            $DOCKER_IMAGE:$VERSION-amd64 \
            $DOCKER_IMAGE:$VERSION-arm64
          docker manifest push $DOCKER_IMAGE:$VERSION
          docker manifest create $DOCKER_IMAGE:latest \
            $DOCKER_IMAGE:$VERSION-amd64 \
            $DOCKER_IMAGE:$VERSION-arm64
          docker manifest push $DOCKER_IMAGE:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: hieutq/unifi-os-server
          short-description: "Self-hosted UniFi OS Server - single volume, no privileged mode, multi-arch, auto-updated"
          readme-filepath: ./README.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
