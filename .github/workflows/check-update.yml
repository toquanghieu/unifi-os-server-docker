name: Check for Updates

on:
  schedule:
    - cron: "0 6 * * *" # Everyday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FIRMWARE_API: https://fw-update.ubnt.com/api/firmware-latest

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get current versions from Dockerfile
        id: current
        run: |
          UOS=$(grep -oP '^ARG UOS_SERVER_VERSION=\K[0-9.]+' Dockerfile)
          echo "uos=$UOS" >> "$GITHUB_OUTPUT"
          echo "Current: UOS=$UOS"

      - name: Check latest versions from Ubiquiti API
        id: latest
        run: |
          # UniFi OS Server (linux-x64, release channel)
          UOS=$(curl -fsSL "$FIRMWARE_API?filter=eq~~product~~unifi-os-server&filter=eq~~platform~~linux-x64&filter=eq~~channel~~release" 2>/dev/null \
            | jq -r '._embedded.firmware[0].version' 2>/dev/null | sed 's/^v//' || true)

          echo "Latest: UOS=${UOS:-?}"
          echo "uos=$UOS" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          CUR_UOS="${{ steps.current.outputs.uos }}"
          NEW_UOS="${{ steps.latest.outputs.uos }}"

          # Keep current unless the API returned a sane, different value.
          TARGET_UOS="$CUR_UOS"
          UPDATE=false

          if [ -n "$NEW_UOS" ] && [ "$NEW_UOS" != "null" ] && [ "$NEW_UOS" != "$CUR_UOS" ]; then
            echo "UOS Server: $CUR_UOS -> $NEW_UOS"
            TARGET_UOS="$NEW_UOS"
            UPDATE=true
          fi

          [ "$UPDATE" = "false" ] && echo "Already up to date (UOS=$CUR_UOS)"

          echo "update=$UPDATE" >> "$GITHUB_OUTPUT"
          echo "uos=$TARGET_UOS" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile versions
        if: steps.compare.outputs.update == 'true'
        run: |
          UOS="${{ steps.compare.outputs.uos }}"
          sed -i "s/^ARG UOS_SERVER_VERSION=[0-9.]\+/ARG UOS_SERVER_VERSION=$UOS/" Dockerfile
          grep -nE '^ARG UOS_SERVER_VERSION=' Dockerfile

      - name: Commit and tag
        if: steps.compare.outputs.update == 'true'
        run: |
          UOS="${{ steps.compare.outputs.uos }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump UOS Server to $UOS"
          git tag "v$UOS" || echo "tag already exists"
          git push origin main
          git push origin "v$UOS" || true

      - name: Trigger build workflow
        if: steps.compare.outputs.update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: 'main',
              inputs: {
                version: '${{ steps.compare.outputs.uos }}'
              }
            });
